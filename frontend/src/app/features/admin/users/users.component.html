<div class="app-page">
  <app-page-header title="Usuários" subtitle="Gestão de acesso ao sistema" />

  @if (loading()) {
    <app-page-skeleton variant="table" />
  } @else if (errorMessage()) {
    <app-state-banner [message]="errorMessage()!" type="error" icon="lock" />
  } @else {
    <section class="app-table-card">
      <div class="app-table-card__body table-wrap">
        <table mat-table [dataSource]="dataSource" class="users-table">
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>E-mail</th>
            <td mat-cell *matCellDef="let row" data-label="E-mail">{{ row.email }}</td>
          </ng-container>

          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef>Perfil</th>
            <td mat-cell *matCellDef="let row" data-label="Perfil">
              <span class="app-chip" [class.app-chip--accent]="row.role === 'ADMIN'">{{ row.role }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="active">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let row" data-label="Status">
              <span class="app-chip" [class.app-chip--success]="row.active" [class.app-chip--muted]="!row.active">
                {{ row.active ? 'Ativo' : 'Inativo' }}
              </span>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="columns"></tr>
          <tr mat-row *matRowDef="let row; columns: columns"></tr>
        </table>
      </div>
    </section>
  }
</div>
