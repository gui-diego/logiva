<div class="app-page">
  <app-page-header title="Clientes" subtitle="Cadastro e gestão de clientes" />

  <div class="app-content-grid">
    <section class="app-table-card">
      <div class="app-table-card__header">
        <h3>Clientes cadastrados</h3>
      </div>
      <div class="app-table-card__body table-wrap">
        @if (loading()) {
          <app-page-skeleton variant="table" />
        } @else {
          <table mat-table [dataSource]="dataSource" class="customers-table">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Nome</th>
              <td mat-cell *matCellDef="let row" data-label="Nome">{{ row.name }}</td>
            </ng-container>

            <ng-container matColumnDef="document">
              <th mat-header-cell *matHeaderCellDef>Documento</th>
              <td mat-cell *matCellDef="let row" data-label="Documento">{{ row.document || '—' }}</td>
            </ng-container>

            <ng-container matColumnDef="city">
              <th mat-header-cell *matHeaderCellDef>Cidade</th>
              <td mat-cell *matCellDef="let row" data-label="Cidade">{{ row.city || '—' }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef></th>
              <td mat-cell *matCellDef="let row" class="actions-cell" data-label="Ações">
                <button mat-icon-button type="button" title="Editar" (click)="startEdit(row)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button type="button" title="Excluir" (click)="remove(row)">
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="columns"></tr>
            <tr mat-row *matRowDef="let row; columns: columns"></tr>
          </table>
        }
      </div>
    </section>

    <section class="app-form-card">
      <h3 class="form-title">{{ editingId() ? 'Editar cliente' : 'Novo cliente' }}</h3>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form">
        <div class="app-form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="name" placeholder="Ex: Empresa ABC" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Documento</mat-label>
            <input matInput formControlName="document" placeholder="CPF ou CNPJ" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-row">
            <mat-label>Cidade</mat-label>
            <input matInput formControlName="city" placeholder="Ex: São Paulo" />
          </mat-form-field>
        </div>

        <div class="app-form-actions">
          @if (editingId()) {
            <button mat-stroked-button type="button" (click)="cancelEdit()" [disabled]="saving()">
              Cancelar
            </button>
          }
          <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || saving()">
            @if (saving()) {
              <mat-spinner diameter="20" />
            } @else {
              <ng-container>
                <mat-icon>{{ editingId() ? 'save' : 'add' }}</mat-icon>
                {{ editingId() ? 'Salvar' : 'Cadastrar' }}
              </ng-container>
            }
          </button>
        </div>
      </form>
    </section>
  </div>
</div>
