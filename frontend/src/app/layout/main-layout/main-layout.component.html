<div
  class="layout"
  [class.layout--mobile-open]="isMobile() && sidenavOpened()"
  [class.layout--collapsed]="!isMobile() && sidenavCollapsed()"
>
  @if (isMobile() && sidenavOpened()) {
    <button
      type="button"
      class="backdrop"
      aria-label="Fechar menu"
      (click)="closeMobileSidenav()"
    ></button>
  }

  <aside
    class="sidebar"
    [class.sidebar--mobile]="isMobile()"
    [class.sidebar--open]="!isMobile() || sidenavOpened()"
  >
    <div class="brand">
      <div class="brand-info">
        <mat-icon class="brand-icon">local_shipping</mat-icon>
        <span class="brand-label">Logiva</span>
      </div>
      @if (!isMobile()) {
        <button
          mat-icon-button
          type="button"
          class="collapse-button"
          aria-label="Recolher menu"
          (click)="toggleSidenav()"
        >
          <mat-icon>{{ sidenavCollapsed() ? 'chevron_right' : 'chevron_left' }}</mat-icon>
        </button>
      }
    </div>

    <mat-nav-list class="nav-list">
      <a
        mat-list-item
        routerLink="/dashboard"
        routerLinkActive="active"
        [matTooltip]="showNavTooltip('Dashboard')"
        matTooltipPosition="right"
        (click)="closeSidenavOnNavigate()"
      >
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle class="nav-label">Dashboard</span>
      </a>
      <a
        mat-list-item
        routerLink="/deliveries"
        routerLinkActive="active"
        [matTooltip]="showNavTooltip('Entregas')"
        matTooltipPosition="right"
        (click)="closeSidenavOnNavigate()"
      >
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle class="nav-label">Entregas</span>
      </a>
      @if (auth.hasRole('ADMIN')) {
        <a
          mat-list-item
          routerLink="/admin/carriers"
          routerLinkActive="active"
          [matTooltip]="showNavTooltip('Transportadoras')"
          matTooltipPosition="right"
          (click)="closeSidenavOnNavigate()"
        >
          <mat-icon matListItemIcon>local_shipping</mat-icon>
          <span matListItemTitle class="nav-label">Transportadoras</span>
        </a>
        <a
          mat-list-item
          routerLink="/admin/customers"
          routerLinkActive="active"
          [matTooltip]="showNavTooltip('Clientes')"
          matTooltipPosition="right"
          (click)="closeSidenavOnNavigate()"
        >
          <mat-icon matListItemIcon>business</mat-icon>
          <span matListItemTitle class="nav-label">Clientes</span>
        </a>
        <a
          mat-list-item
          routerLink="/admin/users"
          routerLinkActive="active"
          [matTooltip]="showNavTooltip('Usuários')"
          matTooltipPosition="right"
          (click)="closeSidenavOnNavigate()"
        >
          <mat-icon matListItemIcon>people</mat-icon>
          <span matListItemTitle class="nav-label">Usuários</span>
        </a>
      }
    </mat-nav-list>
  </aside>

  <div class="main">
    <mat-toolbar color="primary" class="toolbar">
      @if (isMobile()) {
        <button
          mat-icon-button
          type="button"
          class="menu-button"
          aria-label="Abrir menu"
          (click)="toggleSidenav()"
        >
          <mat-icon>menu</mat-icon>
        </button>
        <span class="toolbar-title">Logiva</span>
      }
      <span class="spacer"></span>
      <span class="user-email">{{ auth.currentUser()?.email }}</span>
      <button mat-icon-button type="button" (click)="auth.logout()" title="Sair">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
