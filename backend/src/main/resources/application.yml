spring:
  application:
    name: logistics-dashboard

  datasource:
    url: jdbc:mysql://localhost:3306/logistics_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
    username: logistics
    password: logistics
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    time-zone: America/Sao_Paulo

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-long-enough}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.logistics.dashboard: INFO
